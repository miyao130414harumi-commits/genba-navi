<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>社内資料ナレッジ検索システム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --indigo: #4f46e5; --indigo-dark: #4338ca; --indigo-bg: #eef2ff;
      --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
      --slate-300: #cbd5e1; --slate-500: #64748b; --slate-600: #475569; --slate-900: #0f172a;
    }
    body {
      font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--slate-50); color: var(--slate-900);
    }
    button { cursor: pointer; font-family: inherit; }
    button:active { opacity: .85; }
    button:disabled { opacity: .5; cursor: default; }

    /* ============ ログイン画面 ============ */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
    }
    .login-box { width: 100%; max-width: 400px; }
    .login-logo {
      width: 56px; height: 56px; border-radius: 14px; background: var(--indigo);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 26px; margin: 0 auto 16px;
    }
    .login-title { text-align: center; font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
    .login-sub { text-align: center; font-size: 13px; color: var(--slate-500); margin: 6px 0 24px; }

    /* ============ ヘッダー ============ */
    .topbar {
      position: sticky; top: 0; z-index: 20;
      background: #fff; border-bottom: 1px solid var(--slate-200);
      height: 60px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; gap: 8px;
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-icon {
      width: 36px; height: 36px; border-radius: 10px; background: var(--indigo);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .brand-title { font-weight: 600; letter-spacing: -0.02em; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .user-name { font-size: 13px; color: var(--slate-600); }
    .role-badge {
      color: #fff; border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 600;
      background: var(--indigo);
    }
    .role-badge.staff { background: var(--slate-500); }
    .menu-btn {
      display: none; border: none; background: transparent; font-size: 22px;
      color: var(--slate-600); width: 44px; height: 44px; border-radius: 10px;
    }
    .menu-btn:hover { background: var(--slate-100); }

    /* ============ レイアウト ============ */
    .layout { display: flex; min-height: calc(100vh - 60px); }
    .sidebar {
      width: 232px; background: #fff; border-right: 1px solid var(--slate-200);
      padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
    }
    .nav-btn {
      display: flex; align-items: center; gap: 10px; width: 100%;
      border: none; background: transparent; color: var(--slate-600);
      font-size: 14px; font-weight: 500; padding: 0 12px; height: 44px;
      border-radius: 10px; text-align: left;
    }
    .nav-btn:hover { background: var(--slate-100); }
    .nav-btn.active { background: var(--indigo-bg); color: var(--indigo-dark); font-weight: 600; }
    .sidebar-footer { margin-top: auto; border-top: 1px solid var(--slate-200); padding-top: 12px; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 30; }

    main { flex: 1; padding: 28px 24px; max-width: 1120px; margin: 0 auto; width: 100%; min-width: 0; }

    /* ============ 共通パーツ ============ */
    .page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    h1 { font-size: 24px; letter-spacing: -0.02em; }
    .subtitle { font-size: 13px; color: var(--slate-500); margin-top: 4px; }
    .btn {
      border: none; border-radius: 10px; background: var(--indigo); color: #fff;
      font-size: 14px; font-weight: 600; padding: 0 16px; height: 42px;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn:hover { background: var(--indigo-dark); }
    .btn.secondary { background: #fff; color: var(--slate-900); border: 1px solid var(--slate-200); }
    .btn.secondary:hover { background: var(--slate-50); }
    .btn.danger { background: #dc2626; }
    .btn.ghost { background: transparent; color: var(--slate-600); font-weight: 500; }
    .btn.ghost:hover { background: var(--slate-100); }
    .btn.small { height: 36px; padding: 0 12px; font-size: 13px; }
    .btn.wide { width: 100%; }

    .card {
      background: #fff; border: 1px solid var(--slate-200); border-radius: 12px;
      padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    input, select, textarea {
      width: 100%; padding: 12px 14px; font-size: 16px; /* 16px以上でiOSのズーム暴発を防ぐ */
      border: 1px solid var(--slate-300); border-radius: 10px;
      background: #fff; color: var(--slate-900); font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { outline: 2px solid rgba(99,102,241,.35); border-color: var(--indigo); }
    label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--slate-600); }
    .field { margin-bottom: 16px; }

    .search-wrap { position: relative; margin-bottom: 16px; max-width: 640px; }
    .search-wrap input { padding-left: 38px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--slate-500); font-size: 15px; }

    .filter-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .filter-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .filter-label { font-size: 13px; color: var(--slate-600); margin: 12px 0 6px; display: flex; align-items: center; gap: 4px; }

    .badge {
      display: inline-block; padding: 3px 9px; border-radius: 7px;
      font-size: 12px; background: var(--indigo-bg); color: var(--indigo-dark);
    }
    .badge.tag { background: var(--slate-100); color: #334155; }
    .badge.link { background: #fef3c7; color: #92400e; }
    .chip {
      display: inline-flex; align-items: center; padding: 7px 12px; border-radius: 8px; font-size: 13px;
      background: var(--slate-100); color: #334155; border: 1px solid var(--slate-200);
      margin: 0 6px 6px 0; cursor: pointer; user-select: none;
    }
    .chip.active { background: var(--indigo); color: #fff; border-color: var(--indigo); }

    /* ============ 資料グリッド ============ */
    .grid {
      display: grid; gap: 16px; margin-top: 20px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }
    .doc-card {
      background: #fff; border: 1px solid var(--slate-200); border-radius: 12px;
      padding: 18px; cursor: pointer; display: flex; flex-direction: column; gap: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04); transition: box-shadow .15s ease-out;
      text-align: left; font-family: inherit; font-size: inherit;
    }
    .doc-card:hover { box-shadow: 0 4px 10px rgba(0,0,0,.08); }
    .doc-head { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .doc-icon {
      width: 36px; height: 36px; border-radius: 10px; background: var(--indigo-bg);
      color: var(--indigo); display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .doc-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .doc-desc { font-size: 13px; color: var(--slate-600); line-height: 1.7; }
    .doc-meta { font-size: 12px; color: var(--slate-500); font-variant-numeric: tabular-nums; margin-top: auto; display: flex; align-items: center; gap: 5px; }

    .empty {
      background: #fff; border: 1px solid var(--slate-200); border-radius: 12px;
      text-align: center; color: var(--slate-500); padding: 48px 16px; font-size: 14px; margin-top: 20px;
    }
    .preview-frame {
      width: 100%; height: 62vh; min-height: 340px;
      border: 1px solid var(--slate-200); border-radius: 10px; background: var(--slate-100);
    }
    .hidden { display: none !important; }
    .list-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--slate-100); gap: 8px;
    }
    .muted { font-size: 12px; color: #94a3b8; }
    .row { display: flex; gap: 10px; align-items: center; }
    #status, #loginStatus { text-align: center; font-size: 14px; min-height: 20px; margin-bottom: 8px; }
    .ok { color: #059669; } .ng { color: #dc2626; }
    .file-drop {
      border: 2px dashed var(--slate-300); border-radius: 12px; padding: 28px 16px;
      text-align: center; color: var(--slate-500); font-size: 14px;
      cursor: pointer; margin-bottom: 16px;
    }
    .file-drop:hover { border-color: var(--indigo); background: var(--slate-50); }
    .file-drop.has-file { border-color: var(--indigo); color: var(--indigo-dark); background: var(--indigo-bg); }
    .mode-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .mode-tab {
      flex: 1; border: 1px solid var(--slate-200); background: #fff; color: var(--slate-600);
      border-radius: 10px; height: 40px; font-size: 13px; font-weight: 600;
    }
    .mode-tab.active { background: var(--indigo-bg); color: var(--indigo-dark); border-color: var(--indigo); }
    .detail-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }

    /* ============ レスポンシブ ============ */
    @media (max-width: 900px) {
      .menu-btn { display: flex; align-items: center; justify-content: center; }
      .sidebar {
        position: fixed; top: 0; bottom: 0; left: 0; z-index: 40;
        transform: translateX(-100%); transition: transform .15s ease-out;
        padding-top: 20px;
      }
      .sidebar.open { transform: translateX(0); }
      .overlay.show { display: block; }
      main { padding: 20px 16px; }
      .brand-title { font-size: 14px; }
      .user-name { display: none; }
    }
  </style>
</head>
<body>

  <!-- ============ ログイン画面(デフォルト表示。JSエラー時も白画面にならない) ============ -->
  <div id="loginView" class="login-wrap">
    <div class="login-box">
      <div class="login-logo">📚</div>
      <div class="login-title">社内資料ナレッジ検索システム</div>
      <div class="login-sub">社員ログイン</div>
      <div class="card">
        <div id="loginStatus"></div>
        <div class="field">
          <label>ログインID</label>
          <input id="loginId" placeholder="IDを入力" autocomplete="username">
        </div>
        <div class="field">
          <label>パスワード</label>
          <input id="loginPw" type="password" placeholder="パスワードを入力" autocomplete="current-password">
        </div>
        <button class="btn wide" id="loginBtn" onclick="doLogin()">ログイン</button>
      </div>
    </div>
  </div>

  <!-- ============ アプリ本体 ============ -->
  <div id="appShell" class="hidden">
    <div class="topbar">
      <div class="brand">
        <button class="menu-btn" onclick="toggleSidebar(true)">☰</button>
        <div class="brand-icon">📚</div>
        <div class="brand-title">社内資料ナレッジ検索システム</div>
      </div>
      <div class="topbar-right">
        <span class="user-name" id="userName"></span>
        <span class="role-badge" id="roleBadge"></span>
        <button class="btn ghost small" onclick="doLogout()">ログアウト</button>
      </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar(false)"></div>

    <div class="layout">
      <nav class="sidebar" id="sidebar">
        <button class="nav-btn active" id="nav-listView" onclick="navTo('listView')">🔍 資料検索</button>
        <button class="nav-btn hidden adminOnly" id="nav-editView" onclick="navToNew()">⬆ 資料登録</button>
        <button class="nav-btn hidden adminOnly" id="nav-masterView" onclick="navTo('masterView')">🗂 カテゴリ・タグ管理</button>
        <div class="sidebar-footer">
          <button class="nav-btn" onclick="doLogout()">🚪 ログアウト</button>
        </div>
      </nav>

      <main>
        <div id="status"></div>

        <!-- ============ 検索・一覧 ============ -->
        <div id="listView">
          <div class="page-head">
            <div>
              <h1>資料検索</h1>
              <div class="subtitle">キーワード・カテゴリ・タグで社内資料を探せます</div>
            </div>
            <button class="btn hidden adminOnly" onclick="navToNew()">＋ 新規登録</button>
          </div>

          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input id="keyword" placeholder="タイトル・説明・ファイル名で検索" oninput="onKeywordInput()">
          </div>

          <div class="card">
            <div class="filter-head">
              <div class="filter-title">🔽 絞り込み</div>
              <button class="btn ghost small hidden" id="clearBtn" onclick="clearFilters()">✕ 条件をクリア</button>
            </div>
            <div class="filter-label">カテゴリ</div>
            <select id="catFilter" onchange="render()"></select>
            <div class="filter-label">🏷 タグ</div>
            <div id="tagChips"></div>
          </div>

          <div id="docList" class="grid"></div>
          <div id="emptyBox" class="empty hidden">📭 該当する資料が見つからなかったよ</div>
        </div>

        <!-- ============ 詳細 ============ -->
        <div id="detailView" class="hidden">
          <div class="page-head">
            <button class="btn secondary small" onclick="navTo('listView')">← 資料検索へ戻る</button>
            <div class="row hidden adminOnly">
              <button class="btn secondary small" onclick="editCurrent()">✏ 編集</button>
              <button class="btn danger small" onclick="deleteCurrent()">🗑 削除</button>
            </div>
          </div>
          <div class="card">
            <div id="detailBody"></div>
            <div style="margin-top:16px;">
              <button class="btn" id="downloadBtn" onclick="openFile()">⬇ ダウンロード / 開く</button>
            </div>
          </div>
        </div>

        <!-- ============ 登録・編集(管理者のみ) ============ -->
        <div id="editView" class="hidden">
          <div class="page-head">
            <button class="btn secondary small" onclick="navTo('listView')">← 資料検索へ戻る</button>
          </div>
          <div class="card" style="max-width:680px;">
            <h1 id="editTitle" style="font-size:20px; margin-bottom:16px;">資料の新規登録</h1>

            <div class="mode-tabs">
              <button class="mode-tab active" id="modeFile" onclick="setMode('file')">📎 ファイルを登録</button>
              <button class="mode-tab" id="modeUrl" onclick="setMode('url')">🔗 外部URLを登録</button>
            </div>

            <div id="fileMode">
              <div class="file-drop" id="fileDrop" onclick="document.getElementById('fileInput').click()">
                タップしてPDF・画像を選択
              </div>
              <input type="file" id="fileInput" accept="application/pdf,image/*" class="hidden" onchange="onFilePicked(this.files[0])">
            </div>

            <div id="urlMode" class="hidden">
              <div class="field">
                <label>資料のURL(PDF直リンクや公開ページ)</label>
                <input id="fUrl" placeholder="https://example.go.jp/xxx.pdf" inputmode="url">
              </div>
            </div>

            <div class="field">
              <label>タイトル</label>
              <input id="fTitle" placeholder="例: 新人研修マニュアル2026">
            </div>
            <div class="field">
              <label>説明文</label>
              <textarea id="fDesc" rows="3" placeholder="資料の概要"></textarea>
            </div>
            <div class="field">
              <label>カテゴリ</label>
              <select id="fCat"></select>
            </div>
            <div class="field">
              <label>タグ(タップで選択)</label>
              <div id="fTags"></div>
            </div>
            <button class="btn wide" id="saveBtn" onclick="saveDoc()">保存する</button>
          </div>
        </div>

        <!-- ============ マスタ管理(管理者のみ) ============ -->
        <div id="masterView" class="hidden">
          <div class="page-head">
            <div>
              <h1>カテゴリ・タグ管理</h1>
              <div class="subtitle">資料のカテゴリとタグを追加・削除できます</div>
            </div>
          </div>
          <div class="card" style="margin-bottom:16px;">
            <div class="filter-title" style="margin-bottom:12px;">🗂 カテゴリ</div>
            <div class="row">
              <input id="newCat" placeholder="例: 営業マニュアル">
              <button class="btn small" onclick="addMaster('cats')">追加</button>
            </div>
            <div id="catList" style="margin-top:10px;"></div>
          </div>
          <div class="card">
            <div class="filter-title" style="margin-bottom:12px;">🏷 タグ</div>
            <div class="row">
              <input id="newTag" placeholder="例: 新人向け">
              <button class="btn small" onclick="addMaster('tags')">追加</button>
            </div>
            <div id="tagList" style="margin-top:10px;"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    // ============================================
    // GAS直デプロイなら空のまま。
    // GitHub Pages側から使うならWebアプリURLを入れる
    // ============================================
    // ★GitHub Pages用: ここにGASのWebアプリURL(…/exec)を入れる
    // ※「資料ナレッジ検索システム」のコードを貼った方のプロジェクトのURLだよ
    const GAS_URL = '';

    // JSエラーが起きたら白画面にせず内容を表示する
    window.onerror = function (msg, src, line) {
      const el = document.getElementById('loginStatus');
      if (el) { el.textContent = 'エラー: ' + msg + ' (行' + line + ')'; el.className = 'ng'; }
    };

    function storageSet(k, v) { try { sessionStorage.setItem(k, v); } catch (e) {} }
    function storageRemove(k) { try { sessionStorage.removeItem(k); } catch (e) {} }

    let all = { docs: [], cats: [], tags: [] };
    let keyword = '';
    let selTagIds = new Set();
    let currentDoc = null;
    let editingId = null;
    let uploadedFile = null; // { fileId, fileName, fileType }
    let editMode = 'file';   // 'file' | 'url'
    let session = null;      // { token, name, role }
    let kwTimer = null;

    try { session = JSON.parse(sessionStorage.getItem('session') || 'null'); } catch (e) { session = null; }

    // ============================================
    // API呼び出し(GAS直 / fetch 両対応)
    // ============================================
    function callApi(req) {
      if (session && session.token) req.token = session.token;
      let p;
      if (GAS_URL) {
        p = fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(req),
        }).then(r => r.json()).then(res => {
          if (!res.ok) throw new Error(res.error);
          return res.result;
        });
      } else {
        if (typeof google === 'undefined') {
          return Promise.reject(new Error('GAS_URLが未設定だよ。GitHub Pagesから使うときはファイル冒頭のGAS_URLにWebアプリURLを入れてね'));
        }
        p = new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(res => res.ok ? resolve(res.result) : reject(new Error(res.error)))
            .withFailureHandler(err => reject(err))
            .api(req);
        });
      }
      return p.catch(err => {
        // セッション切れなら強制ログアウト
        if (/セッション|ログインが必要/.test(err.message)) {
          clearSession();
          showLogin('セッションが切れたよ。ログインしなおしてね');
        }
        throw err;
      });
    }

    function setStatus(msg, ok) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = ok ? 'ok' : 'ng';
      if (msg && ok) setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 2500);
    }

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      const p = n => String(n).padStart(2, '0');
      return d.getFullYear() + '/' + p(d.getMonth() + 1) + '/' + p(d.getDate());
    }

    function docIcon(d) {
      if (d.fileType === 'pdf') return '📄';
      if (d.fileType === 'image') return '🖼';
      return '🔗';
    }

    // ============================================
    // ログイン・ログアウト
    // ============================================
    function showLogin(msg) {
      document.getElementById('loginView').classList.remove('hidden');
      document.getElementById('appShell').classList.add('hidden');
      const el = document.getElementById('loginStatus');
      el.textContent = msg || '';
      el.className = 'ng';
    }

    function showApp() {
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('appShell').classList.remove('hidden');
      document.getElementById('userName').textContent = session.name;
      const badge = document.getElementById('roleBadge');
      const isAdmin = session.role === 'admin';
      badge.textContent = isAdmin ? '管理者' : '社員';
      badge.classList.toggle('staff', !isAdmin);
      document.querySelectorAll('.adminOnly').forEach(el => el.classList.toggle('hidden', !isAdmin));
      navTo('listView');
      load();
    }

    function clearSession() {
      session = null;
      storageRemove('session');
    }

    function doLogin() {
      const id = document.getElementById('loginId').value.trim();
      const pw = document.getElementById('loginPw').value;
      const st = document.getElementById('loginStatus');
      if (!id || !pw) { st.textContent = 'IDとパスワードを入力してね'; st.className = 'ng'; return; }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      st.textContent = 'ログイン中...';
      st.className = 'ok';

      callApi({ action: 'login', data: { id: id, password: pw } }).then(res => {
        btn.disabled = false;
        session = { token: res.token, name: res.name, role: res.role };
        storageSet('session', JSON.stringify(session));
        document.getElementById('loginPw').value = '';
        st.textContent = '';
        showApp();
      }).catch(err => {
        btn.disabled = false;
        st.textContent = err.message;
        st.className = 'ng';
      });
    }

    function doLogout() {
      if (session && session.token) {
        callApi({ action: 'logout' }).catch(() => {});
      }
      clearSession();
      showLogin('');
      toggleSidebar(false);
    }

    // ============================================
    // 画面切替・サイドバー
    // ============================================
    function toggleSidebar(open) {
      document.getElementById('sidebar').classList.toggle('open', open);
      document.getElementById('overlay').classList.toggle('show', open);
    }

    function navTo(id) {
      // 管理者専用画面のガード(UI非表示に加えてルート側でも弾く)
      if ((id === 'editView' || id === 'masterView') && (!session || session.role !== 'admin')) {
        id = 'listView';
        setStatus('この画面は管理者だけだよ', false);
      }
      ['listView', 'detailView', 'editView', 'masterView'].forEach(v => {
        document.getElementById(v).classList.toggle('hidden', v !== id);
      });
      ['listView', 'editView', 'masterView'].forEach(v => {
        const btn = document.getElementById('nav-' + v);
        if (btn) btn.classList.toggle('active', v === id || (id === 'detailView' && v === 'listView'));
      });
      toggleSidebar(false);
      window.scrollTo(0, 0);
      if (id === 'masterView') renderMaster();
    }

    function navToNew() { openEdit(null); }

    // ============================================
    // データ読み込み・一覧描画
    // ============================================
    function load() {
      setStatus('読み込み中...', true);
      callApi({ action: 'listAll' }).then(res => {
        all = res;
        setStatus('', true);
        renderFilters();
        render();
      }).catch(err => setStatus('読み込み失敗: ' + err.message, false));
    }

    function renderFilters() {
      const catSel = document.getElementById('catFilter');
      const cur = catSel.value;
      catSel.innerHTML = '<option value="">すべてのカテゴリ</option>' +
        all.cats.map(c => `<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('');
      catSel.value = cur;

      document.getElementById('tagChips').innerHTML = all.tags.map(t =>
        `<span class="chip ${selTagIds.has(t.id) ? 'active' : ''}" onclick="toggleTag('${esc(t.id)}')">${esc(t.name)}</span>`
      ).join('') || '<span class="muted">タグはまだないよ</span>';
    }

    function toggleTag(id) {
      selTagIds.has(id) ? selTagIds.delete(id) : selTagIds.add(id);
      renderFilters();
      render();
    }

    function onKeywordInput() {
      clearTimeout(kwTimer);
      kwTimer = setTimeout(() => {
        keyword = document.getElementById('keyword').value.trim().toLowerCase();
        render();
      }, 300);
    }

    function clearFilters() {
      keyword = '';
      selTagIds.clear();
      document.getElementById('keyword').value = '';
      document.getElementById('catFilter').value = '';
      renderFilters();
      render();
    }

    function catName(id) { const c = all.cats.find(c => c.id === id); return c ? c.name : ''; }
    function tagName(id) { const t = all.tags.find(t => t.id === id); return t ? t.name : ''; }

    function filteredDocs() {
      const catId = document.getElementById('catFilter').value;
      return all.docs.filter(d => {
        if (keyword) {
          const hay = [d.title, d.description, d.fileName, d.url].join(' ').toLowerCase();
          if (!hay.includes(keyword)) return false;
        }
        if (catId && d.categoryId !== catId) return false;
        if (selTagIds.size > 0) {
          for (const tid of selTagIds) if (!d.tagIds.includes(tid)) return false;
        }
        return true;
      }).sort((a, b) => new Date(b.registeredAt) - new Date(a.registeredAt));
    }

    function render() {
      const docs = filteredDocs();
      const hasFilter = keyword || selTagIds.size > 0 || document.getElementById('catFilter').value;
      document.getElementById('clearBtn').classList.toggle('hidden', !hasFilter);
      document.getElementById('emptyBox').classList.toggle('hidden', docs.length !== 0);

      document.getElementById('docList').innerHTML = docs.map(d => `
        <button class="doc-card" onclick="openDetail('${esc(d.id)}')">
          <div class="doc-head">
            <div class="doc-icon">${docIcon(d)}</div>
            <div class="doc-title">${esc(d.title) || '無題の資料'}</div>
          </div>
          <div>
            ${d.categoryId && catName(d.categoryId) ? `<span class="badge">${esc(catName(d.categoryId))}</span>` : ''}
            ${d.tagIds.map(tid => tagName(tid) ? ` <span class="badge tag">${esc(tagName(tid))}</span>` : '').join('')}
            ${!d.fileId && d.url ? ' <span class="badge link">外部リンク</span>' : ''}
          </div>
          ${d.description ? `<div class="doc-desc">${esc(d.description.length > 80 ? d.description.slice(0, 80) + '…' : d.description)}</div>` : ''}
          <div class="doc-meta">📅 ${fmtDate(d.registeredAt)}</div>
        </button>`).join('');
    }

    // ============================================
    // 詳細
    // ============================================
    function previewHtml(d) {
      if (d.fileId) {
        return `<iframe class="preview-frame" src="https://drive.google.com/file/d/${esc(d.fileId)}/preview" allow="autoplay"></iframe>`;
      }
      if (d.url) {
        const isPdf = /\.pdf($|\?)/i.test(d.url);
        const src = isPdf
          ? 'https://docs.google.com/viewer?embedded=true&url=' + encodeURIComponent(d.url)
          : d.url;
        return `<iframe class="preview-frame" src="${esc(src)}"></iframe>
          <div class="muted" style="margin-top:6px;">※サイト側の設定によっては埋め込み表示できないことがあるよ。その場合は下のボタンから開いてね。</div>`;
      }
      return '<div class="empty" style="margin-top:12px;">プレビューできるファイルがないよ</div>';
    }

    function openDetail(id) {
      currentDoc = all.docs.find(d => d.id === id);
      if (!currentDoc) return;
      const d = currentDoc;
      document.getElementById('detailBody').innerHTML = `
        <div class="doc-head" style="margin-bottom:10px;">
          <div class="doc-icon">${docIcon(d)}</div>
          <div class="detail-title">${esc(d.title)}</div>
        </div>
        <div style="margin-bottom:8px;">
          ${d.categoryId && catName(d.categoryId) ? `<span class="badge">${esc(catName(d.categoryId))}</span>` : ''}
          ${d.tagIds.map(tid => tagName(tid) ? ` <span class="badge tag">${esc(tagName(tid))}</span>` : '').join('')}
          ${!d.fileId && d.url ? ' <span class="badge link">外部リンク</span>' : ''}
        </div>
        <div class="doc-meta" style="margin-bottom:12px;">
          📅 登録日: ${fmtDate(d.registeredAt)}
          ${d.fileName ? ' &nbsp;📎 ' + esc(d.fileName) : ''}
          ${!d.fileId && d.url ? ' &nbsp;🔗 ' + esc(d.url) : ''}
        </div>
        ${d.description ? `<div class="doc-desc" style="white-space:pre-wrap; margin-bottom:14px;">${esc(d.description)}</div>` : ''}
        ${previewHtml(d)}
      `;
      document.getElementById('downloadBtn').classList.toggle('hidden', !d.fileId && !d.url);
      navTo('detailView');
    }

    function openFile() {
      if (!currentDoc) return;
      if (currentDoc.fileId) {
        window.open('https://drive.google.com/uc?export=download&id=' + currentDoc.fileId, '_blank');
      } else if (currentDoc.url) {
        window.open(currentDoc.url, '_blank');
      }
    }

    function editCurrent() { if (currentDoc) openEdit(currentDoc.id); }

    function deleteCurrent() {
      if (!currentDoc) return;
      if (!confirm('「' + currentDoc.title + '」を削除する？(アップロード済みファイルはドライブのゴミ箱に移動)')) return;
      setStatus('削除中...', true);
      callApi({ action: 'deleteDoc', data: { id: currentDoc.id } }).then(() => {
        setStatus('削除したよ', true);
        navTo('listView');
        load();
      }).catch(err => setStatus('エラー: ' + err.message, false));
    }

    // ============================================
    // 登録・編集
    // ============================================
    function setMode(mode) {
      editMode = mode;
      document.getElementById('modeFile').classList.toggle('active', mode === 'file');
      document.getElementById('modeUrl').classList.toggle('active', mode === 'url');
      document.getElementById('fileMode').classList.toggle('hidden', mode !== 'file');
      document.getElementById('urlMode').classList.toggle('hidden', mode !== 'url');
    }

    function openEdit(id) {
      editingId = id;
      uploadedFile = null;
      const doc = id ? all.docs.find(d => d.id === id) : null;
      document.getElementById('editTitle').textContent = doc ? '資料の編集' : '資料の新規登録';
      document.getElementById('fTitle').value = doc ? doc.title : '';
      document.getElementById('fDesc').value = doc ? doc.description : '';
      document.getElementById('fUrl').value = doc ? doc.url : '';

      document.getElementById('fCat').innerHTML = '<option value="">カテゴリを選択</option>' +
        all.cats.map(c => `<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('');
      document.getElementById('fCat').value = doc ? doc.categoryId : '';

      const selected = new Set(doc ? doc.tagIds : []);
      document.getElementById('fTags').innerHTML = all.tags.map(t =>
        `<span class="chip ${selected.has(t.id) ? 'active' : ''}" data-tid="${esc(t.id)}" onclick="this.classList.toggle('active')">${esc(t.name)}</span>`
      ).join('') || '<span class="muted">タグはマスタ管理から追加してね</span>';

      if (doc && doc.fileId) {
        uploadedFile = { fileId: doc.fileId, fileName: doc.fileName, fileType: doc.fileType };
        setDropLabel('📎 ' + doc.fileName + '(タップで差し替え)', true);
        setMode('file');
      } else if (doc && doc.url) {
        setDropLabel('タップしてPDF・画像を選択', false);
        setMode('url');
      } else {
        setDropLabel('タップしてPDF・画像を選択', false);
        setMode('file');
      }
      navTo('editView');
    }

    function setDropLabel(text, hasFile) {
      const el = document.getElementById('fileDrop');
      el.textContent = text;
      el.classList.toggle('has-file', hasFile);
    }

    function detectFileType(file) {
      const mime = (file.type || '').toLowerCase();
      const name = (file.name || '').toLowerCase();
      if (mime.includes('pdf') || name.endsWith('.pdf')) return 'pdf';
      if (mime.startsWith('image/') || /\.(png|jpe?g|gif|webp)$/.test(name)) return 'image';
      return null; // 対応外は弾く
    }

    function onFilePicked(file) {
      if (!file) return;
      const type = detectFileType(file);
      if (!type) { setStatus('PDFか画像だけ登録できるよ', false); return; }
      if (file.size > 15 * 1024 * 1024) { setStatus('15MBまでにしてね', false); return; }

      setDropLabel('⏳ アップロード中...', false);
      const reader = new FileReader();
      reader.onload = () => {
        const base64 = reader.result.split(',')[1];
        callApi({ action: 'upload', data: { base64: base64, mimeType: file.type || 'application/octet-stream', fileName: file.name } })
          .then(res => {
            uploadedFile = { fileId: res.fileId, fileName: res.fileName, fileType: type };
            setDropLabel('📎 ' + res.fileName + '(タップで差し替え)', true);
            setStatus('アップロードしたよ', true);
          })
          .catch(err => {
            setDropLabel('タップしてPDF・画像を選択', false);
            setStatus('アップロード失敗: ' + err.message, false);
          });
      };
      reader.onerror = () => setStatus('ファイルの読み込みに失敗したよ', false);
      reader.readAsDataURL(file);
    }

    function saveDoc() {
      const title = document.getElementById('fTitle').value.trim();
      if (!title) { setStatus('タイトルを入れてね', false); return; }

      let data;
      if (editMode === 'url') {
        const url = document.getElementById('fUrl').value.trim();
        if (!url) { setStatus('URLを入れてね', false); return; }
        if (!/^https?:\/\//i.test(url)) { setStatus('URLは https:// から入れてね', false); return; }
        data = {
          fileType: /\.pdf($|\?)/i.test(url) ? 'pdf' : 'link',
          fileId: '', fileName: '', url: url,
        };
      } else {
        if (!uploadedFile) { setStatus('ファイルをアップロードしてね', false); return; }
        data = {
          fileType: uploadedFile.fileType,
          fileId: uploadedFile.fileId,
          fileName: uploadedFile.fileName,
          url: '',
        };
      }

      const tagIds = [...document.querySelectorAll('#fTags .chip.active')].map(el => el.dataset.tid);
      Object.assign(data, {
        id: editingId,
        title: title,
        description: document.getElementById('fDesc').value.trim(),
        categoryId: document.getElementById('fCat').value,
        tagIds: tagIds,
      });

      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      setStatus('保存中...', true);
      callApi({ action: editingId ? 'updateDoc' : 'addDoc', data: data }).then(() => {
        btn.disabled = false;
        setStatus(editingId ? '更新したよ' : '登録したよ', true);
        navTo('listView');
        load();
      }).catch(err => {
        btn.disabled = false;
        setStatus('保存失敗: ' + err.message, false);
      });
    }

    // ============================================
    // マスタ管理
    // ============================================
    function renderMaster() {
      const catUsage = id => all.docs.filter(d => d.categoryId === id).length;
      const tagUsage = id => all.docs.filter(d => d.tagIds.includes(id)).length;

      document.getElementById('catList').innerHTML = all.cats.map(c => `
        <div class="list-item">
          <span><span class="badge">${esc(c.name)}</span> <span class="muted">${catUsage(c.id)}件で使用中</span></span>
          <button class="btn danger small" onclick="delMaster('cats','${esc(c.id)}','${esc(c.name)}',${catUsage(c.id)})">削除</button>
        </div>`).join('') || '<div class="muted">カテゴリはまだないよ</div>';

      document.getElementById('tagList').innerHTML = all.tags.map(t => `
        <div class="list-item">
          <span><span class="badge tag">${esc(t.name)}</span> <span class="muted">${tagUsage(t.id)}件で使用中</span></span>
          <button class="btn danger small" onclick="delMaster('tags','${esc(t.id)}','${esc(t.name)}',${tagUsage(t.id)})">削除</button>
        </div>`).join('') || '<div class="muted">タグはまだないよ</div>';
    }

    function addMaster(kind) {
      const inputId = kind === 'cats' ? 'newCat' : 'newTag';
      const name = document.getElementById(inputId).value.trim();
      if (!name) { setStatus('名前を入れてね', false); return; }
      callApi({ action: 'addMaster', data: { kind: kind, name: name } }).then(res => {
        (kind === 'cats' ? all.cats : all.tags).push(res);
        document.getElementById(inputId).value = '';
        renderMaster();
        renderFilters();
        setStatus('追加したよ', true);
      }).catch(err => setStatus('エラー: ' + err.message, false));
    }

    function delMaster(kind, id, name, usage) {
      const warn = usage > 0
        ? `「${name}」は${usage}件の資料で使われてるよ。それでも削除する？`
        : `「${name}」を削除する？`;
      if (!confirm(warn)) return;
      callApi({ action: 'delMaster', data: { kind: kind, id: id } }).then(() => {
        if (kind === 'cats') all.cats = all.cats.filter(c => c.id !== id);
        else all.tags = all.tags.filter(t => t.id !== id);
        renderMaster();
        renderFilters();
        render();
        setStatus('削除したよ', true);
      }).catch(err => setStatus('エラー: ' + err.message, false));
    }

    // ============================================
    // 起動: 保存済みセッションがあれば検証してからアプリ表示
    // ============================================
    document.getElementById('loginPw').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    if (session && session.token) {
      callApi({ action: 'me' }).then(res => {
        session.name = res.name;
        session.role = res.role;
        storageSet('session', JSON.stringify(session));
        showApp();
      }).catch(() => {
        clearSession();
        showLogin('');
      });
    } else {
      showLogin('');
    }
  </script>
</body>
</html>
